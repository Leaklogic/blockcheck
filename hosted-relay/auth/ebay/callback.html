<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting To Local eBay App</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #10212c;
        --muted: #58707b;
        --paper: #f5efe4;
        --panel: rgba(255, 255, 255, 0.86);
        --accent: #0f7b74;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(15, 123, 116, 0.18), transparent 34%),
          radial-gradient(circle at bottom right, rgba(224, 135, 40, 0.16), transparent 28%),
          var(--paper);
        color: var(--ink);
      }

      main {
        width: min(720px, 100%);
        padding: 28px;
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 20px 60px rgba(16, 33, 44, 0.12);
        border: 1px solid rgba(16, 33, 44, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        color: var(--accent);
      }

      code,
      pre {
        font-family: Consolas, "Courier New", monospace;
      }

      pre {
        white-space: pre-wrap;
        overflow: auto;
        padding: 14px;
        border-radius: 16px;
        background: #10212c;
        color: #eef8f6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Redirecting to your local app</h1>
      <p id="status">
        eBay has returned to the hosted callback page. We are now forwarding the
        response to the local app running on <code>http://localhost:3000</code>.
      </p>
      <p>
        If the redirect does not happen automatically, use the manual link
        below.
      </p>
      <p><a id="manual-link" href="#">Open local callback</a></p>
      <pre id="details"></pre>
    </main>
    <script>
      const localUrl = new URL("http://localhost:3000/auth/ebay/callback");
      localUrl.search = window.location.search;
      localUrl.hash = window.location.hash;

      document.getElementById("manual-link").href = localUrl.toString();
      document.getElementById("details").textContent = JSON.stringify({
        hostedCallback: window.location.href,
        localCallback: localUrl.toString(),
      }, null, 2);

      window.location.replace(localUrl.toString());
    </script>
  </body>
</html>
